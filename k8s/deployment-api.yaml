apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-api
  labels:
    app: orion
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orion
      component: api
  template:
    metadata:
      labels:
        app: orion
        component: api
    spec:
      containers:
        - name: api
          image: orion-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: orion-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: orion-api
  labels:
    app: orion
    component: api
spec:
  selector:
    app: orion
    component: api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  type: ClusterIP
