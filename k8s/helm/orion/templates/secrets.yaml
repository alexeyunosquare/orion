apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.secretsRef }}
  labels:
    app: orion
    release: {{ .Release.Name }}
type: Opaque
stringData:
  ORION_TEMPORAL_HOST: "temporal"
  ORION_TEMPORAL_PORT: "7233"
  ORION_TEMPORAL_NAMESPACE: "default"
  ORION_TEMPORAL_TASK_QUEUE: "orion-task-queue"
  ORION_DB_URL: "postgresql+asyncpg://postgres:postgres@orion-db:5432/orion"
  ORION_REDIS_URL: "redis://redis:6379/0"
  ORION_REDIS_STREAM_CHANNEL: "orion:streams"
