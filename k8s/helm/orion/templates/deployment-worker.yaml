apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: orion
    component: worker
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: orion
      component: worker
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: orion
        component: worker
        release: {{ .Release.Name }}
    spec:
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.global.secretsRef }}
          resources:
            requests:
              memory: {{ .Values.worker.resources.requests.memory | quote }}
              cpu: {{ .Values.worker.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.worker.resources.limits.memory | quote }}
              cpu: {{ .Values.worker.resources.limits.cpu | quote }}
