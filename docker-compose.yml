services:
  temporal:
    image: temporalio/auto-setup:latest
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_HOST=temporal-db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "7233:7233"
      - "8233:8233"
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  orion-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orion
    ports:
      - "5432:5432"
    volumes:
      - orion-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orion"]
      interval: 5s
      timeout: 5s
      retries: 5

  orion-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ORION_TEMPORAL_HOST: temporal
      ORION_DB_URL: postgresql+asyncpg://postgres:postgres@orion-db:5432/orion
      ORION_REDIS_URL: redis://redis:6379/0
    depends_on:
      temporal:
        condition: service_healthy
      orion-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  orion-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      ORION_TEMPORAL_HOST: temporal
      ORION_DB_URL: postgresql+asyncpg://postgres:postgres@orion-db:5432/orion
      ORION_REDIS_URL: redis://redis:6379/0
    depends_on:
      temporal:
        condition: service_healthy
      orion-db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  orion-db-data:
